<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Board Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="admin-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">OBS Gift Board</p>
        <h1>관리자 페이지</h1>
        <p>설정을 바꾸면 OBS 화면에 실시간으로 반영됩니다.</p>
      </div>
      <div class="status" id="status">연결 준비 중</div>
    </header>

    <section class="panel token-panel">
      <div class="panel-title-row">
        <div>
          <h2>접속 보호</h2>
          <p class="hint">관리자 토큰은 아무나 설정을 바꾸거나 테스트 이벤트를 보내지 못하게 막는 비밀번호입니다.</p>
        </div>
      </div>
      <label>관리자 토큰</label>
      <div class="token-row">
        <input id="token" type="password" placeholder="ADMIN_TOKEN 입력" />
        <button id="saveTokenBtn">저장</button>
      </div>
      <p class="hint">로컬 기본값은 <code>dev-token</code>입니다. Render에 올릴 때는 환경변수 <code>ADMIN_TOKEN</code>에 원하는 값으로 바꾸면 됩니다.</p>
    </section>

    <section class="grid">
      <form id="settingsForm" class="panel settings-grid">
        <h2>오버레이 표시 설정</h2>

        <label>최대 표시 개수 <input name="maxItems" type="number" min="1" max="50" /></label>
        <label>최소 표시 금액 <input name="minValue" type="number" min="0" /></label>

        <label>폰트 크기 <input name="fontSize" type="range" min="10" max="32" /></label>
        <label>카드 높이 <input name="cardHeight" type="range" min="38" max="90" /></label>
        <label>카드 간격 <input name="cardGap" type="range" min="0" max="24" /></label>
        <label>배경 투명도 <input name="backgroundOpacity" type="range" min="0" max="1" step="0.01" /></label>

        <label>화면 정렬
          <select name="viewSort">
            <option value="latest">화면에는 최신순 표시</option>
            <option value="highestValue">화면에도 금액순 표시</option>
          </select>
        </label>
        <label>초과 시 유지 규칙
          <select name="keepRule">
            <option value="highestValue">금액 높은 항목 우선 유지</option>
            <option value="latest">최신 항목 우선 유지</option>
          </select>
        </label>

        <label>합산 유지 시간(ms) <input name="mergeWindowMs" type="number" min="1000" step="1000" /></label>
        <label>특정 기프트만 표시 <input name="allowedGifts" type="text" placeholder="Rose, Galaxy" /></label>
        <label>숨길 유저 <input name="hiddenUsers" type="text" placeholder="user1, user2" /></label>

        <div class="toggles">
          <label><input name="showProfile" type="checkbox" /> 프로필 사진 표시</label>
          <label><input name="showGiftIcon" type="checkbox" /> 기프트 이미지 표시</label>
          <label><input name="showValue" type="checkbox" /> 💎 환산 표시</label>
          <label><input name="showRank" type="checkbox" /> 순서 숫자 표시</label>
          <label><input name="mergeEnabled" type="checkbox" /> 같은 유저+기프트 합산</label>
        </div>

        <button type="submit" class="primary">설정 저장</button>
      </form>

      <section class="panel tools">
        <h2>테스트 / 운영</h2>
        <div class="button-stack">
          <button id="testGiftBtn" class="primary">테스트 기프트 보내기</button>
          <button id="testMemberBtn" class="primary secondary">테스트 멤버 레벨업 보내기</button>
          <button id="clearBtn" class="danger">리스트 초기화</button>
        </div>
        <hr />
        <h3>수동 기프트 추가</h3>
        <form id="manualGiftForm" class="manual-form">
          <input name="nickname" placeholder="닉네임" value="테스트유저" />
          <input name="giftName" placeholder="기프트명" value="Rose" />
          <input name="giftIconUrl" placeholder="기프트 이미지 URL" />
          <input name="profileUrl" placeholder="프로필 이미지 URL" />
          <div class="mini-grid">
            <input name="count" type="number" min="1" value="1" />
            <input name="unitValue" type="number" min="0" value="1" />
          </div>
          <button type="submit">추가</button>
        </form>
        <hr />
        <h3>현재 표시 목록</h3>
        <div id="giftPreview" class="gift-preview"></div>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
